<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Retailer Module | AgriChain</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

body{
    background:#eef6ef;
    font-family:Arial,Helvetica,sans-serif;
}

.navbar{
    background:#198754;
}

.card{
    border:none;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
}

.form-control{
    border-radius:12px;
}

.btn-success{
    border-radius:30px;
}

.icon{
    font-size:55px;
    color:#198754;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand fw-bold" href="/">
🏪 AgriChain
</a>

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="/">Home</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="/retailer">Retailer</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/products">Products</a>
</li>

</ul>

</div>

</nav>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-7">

<div class="card p-4">

<div class="text-center mb-4">

<div class="icon">
<i class="fas fa-store"></i>
</div>

<h2 class="fw-bold text-success">
Retailer Module
</h2>

<p class="text-muted">
Record retailer information before the product reaches customers.
</p>

</div>

<form method="POST">

<div class="mb-3">
<label class="form-label">Product ID</label>
<input type="text" class="form-control" name="product_id" required>
</div>

<div class="mb-3">
<label class="form-label">Retailer Name</label>
<input type="text" class="form-control" name="retailer_name" required>
</div>

<div class="mb-3">
<label class="form-label">Store Name</label>
<input type="text" class="form-control" name="store_name" required>
</div>

<div class="mb-3">
<label class="form-label">Location</label>
<input type="text" class="form-control" name="location" required>
</div>

<div class="mb-4">
<label class="form-label">Arrival Date</label>
<input type="date" class="form-control" name="arrival_date" required>
</div>

<div class="d-grid">

<button class="btn btn-success btn-lg">

<i class="fas fa-save"></i>

Save Retailer Details

</button>

</div>

</form>

<hr>

<div class="text-center">

<a href="/" class="btn btn-outline-success">

<i class="fas fa-house"></i>

Back to Dashboard

</a>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
