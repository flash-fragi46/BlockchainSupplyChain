<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Customer Verification | AgriChain</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        body{
            background:#eef8f2;
        }

        .card{
            border:none;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,.1);
        }

        .scan-box{
            background:#f8f9fa;
            border:2px dashed #198754;
            border-radius:15px;
            padding:30px;
        }

        .icon{
            font-size:70px;
            color:#198754;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="fa-solid fa-seedling"></i> AgriChain
        </a>
    </div>
</nav>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-7">

<div class="card p-4">

<div class="text-center mb-4">

<i class="fa-solid fa-qrcode icon"></i>

<h2 class="text-success mt-3">
Customer Verification
</h2>

<p class="text-muted">
Scan or enter a Product ID to verify the complete blockchain journey.
</p>

</div>

<div class="scan-box text-center">

<form id="verifyForm">

<div class="mb-3">

<input
type="text"
name="product_id"
class="form-control form-control-lg"
placeholder="Enter Product ID (Example: P001)"
required>

</div>

<button class="btn btn-success btn-lg w-100">

<i class="fa-solid fa-shield-halved"></i>

Verify Product

</button>

</form>

</div>

<div class="alert alert-success mt-4">

<i class="fa-solid fa-circle-info"></i>

Customers can verify:

<ul class="mt-3">

<li>Farmer Information</li>

<li>Distributor Details</li>

<li>Retailer Details</li>

<li>Blockchain Hash</li>

<li>QR Code Verification</li>

</ul>

</div>

<div class="text-center">

<a href="/" class="btn btn-outline-success">

<i class="fa-solid fa-house"></i>

Back to Dashboard

</a>

</div>

</div>

</div>

</div>

</div>
<script>
document.getElementById("verifyForm").addEventListener("submit", function(e){

    e.preventDefault();

    const productId = document.querySelector("input[name='product_id']").value.trim();

    if(productId===""){
        alert("Please enter Product ID");
        return;
    }

    window.location.href="/history/"+productId;

});
</script>
</body>

</html>
